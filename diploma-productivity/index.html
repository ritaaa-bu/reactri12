<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продуктивность - Трекер привычек и задач</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .habit-item, .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .habit-item:hover, .task-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .habit-info, .task-info {
            flex: 1;
        }

        .habit-name, .task-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .habit-streak {
            font-size: 12px;
            color: #666;
        }

        .task-priority {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 5px;
        }

        .priority-high {
            background: #ffebee;
            color: #c62828;
        }

        .priority-medium {
            background: #fff3e0;
            color: #ef6c00;
        }

        .priority-low {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .delete-btn {
            background: #ff5252;
            padding: 8px 12px;
            margin-left: 10px;
        }

        .delete-btn:hover {
            background: #ff1744;
        }

        .check-btn {
            background: #4caf50;
            padding: 8px 12px;
        }

        .check-btn:hover {
            background: #43a047;
        }

        .timer-display {
            text-align: center;
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .timer-mode {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .mode-btn {
            background: #e0e0e0;
            color: #333;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .completed {
            opacity: 0.6;
            text-decoration: line-through;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .timer-display {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Продуктивность</h1>
        
        <div class="dashboard">
            <!-- Трекер привычек -->
            <div class="card">
                <h2>📊 Трекер привычек</h2>
                <div class="input-group">
                    <input type="text" id="habitInput" placeholder="Новая привычка...">
                    <button onclick="addHabit()">Добавить</button>
                </div>
                <div id="habitsList"></div>
            </div>

            <!-- Менеджер задач -->
            <div class="card">
                <h2>✅ Менеджер задач</h2>
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="Новая задача...">
                    <select id="taskPriority">
                        <option value="high">Высокий</option>
                        <option value="medium" selected>Средний</option>
                        <option value="low">Низкий</option>
                    </select>
                    <button onclick="addTask()">Добавить</button>
                </div>
                <div id="tasksList"></div>
            </div>

            <!-- Таймер Pomodoro -->
            <div class="card">
                <h2>⏱️ Pomodoro Таймер</h2>
                <div class="timer-mode">
                    <button class="mode-btn active" onclick="setTimerMode(25, this)">Работа</button>
                    <button class="mode-btn" onclick="setTimerMode(5, this)">Короткий</button>
                    <button class="mode-btn" onclick="setTimerMode(15, this)">Длинный</button>
                </div>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button onclick="startTimer()">Старт</button>
                    <button onclick="pauseTimer()">Пауза</button>
                    <button onclick="resetTimer()">Сброс</button>
                </div>
            </div>

            <!-- Статистика -->
            <div class="card">
                <h2>📈 Статистика</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="habitsCompleted">0/0</span>
                        <span class="stat-label">Привычки сегодня</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="tasksCompleted">0/0</span>
                        <span class="stat-label">Задачи выполнено</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="totalStreak">0</span>
                        <span class="stat-label">Общая серия</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="pomodorosToday">0</span>
                        <span class="stat-label">Pomodoro сегодня</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Данные приложения
        let habits = JSON.parse(localStorage.getItem('habits')) || [];
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let pomodorosToday = parseInt(localStorage.getItem('pomodorosToday')) || 0;
        let lastResetDate = localStorage.getItem('lastResetDate') || new Date().toDateString();

        // Проверка сброса дня
        if (lastResetDate !== new Date().toDateString()) {
            habits = habits.map(habit => ({
                ...habit,
                completedToday: false
            }));
            pomodorosToday = 0;
            localStorage.setItem('lastResetDate', new Date().toDateString());
            saveData();
        }

        // Таймер
        let timerInterval = null;
        let timeLeft = 25 * 60;
        let isRunning = false;
        let currentMode = 25;

        // Сохранение данных
        function saveData() {
            localStorage.setItem('habits', JSON.stringify(habits));
            localStorage.setItem('tasks', JSON.stringify(tasks));
            localStorage.setItem('pomodorosToday', pomodorosToday.toString());
            updateStats();
        }

        // Обновление статистики
        function updateStats() {
            const completedHabits = habits.filter(h => h.completedToday).length;
            const completedTasks = tasks.filter(t => t.completed).length;
            const totalStreak = habits.reduce((sum, h) => sum + h.streak, 0);

            document.getElementById('habitsCompleted').textContent = `${completedHabits}/${habits.length}`;
            document.getElementById('tasksCompleted').textContent = `${completedTasks}/${tasks.length}`;
            document.getElementById('totalStreak').textContent = totalStreak;
            document.getElementById('pomodorosToday').textContent = pomodorosToday;
        }

        // Рендер привычек
        function renderHabits() {
            const container = document.getElementById('habitsList');
            container.innerHTML = '';

            habits.forEach((habit, index) => {
                const div = document.createElement('div');
                div.className = 'habit-item';
                div.innerHTML = `
                    <div class="habit-info">
                        <div class="habit-name">${habit.name}</div>
                        <div class="habit-streak">🔥 Серия: ${habit.streak} дней</div>
                    </div>
                    <div>
                        <button class="check-btn" onclick="toggleHabit(${index})">
                            ${habit.completedToday ? '✓' : 'Отметить'}
                        </button>
                        <button class="delete-btn" onclick="deleteHabit(${index})">✕</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Рендер задач
        function renderTasks() {
            const container = document.getElementById('tasksList');
            container.innerHTML = '';

            tasks.forEach((task, index) => {
                const div = document.createElement('div');
                div.className = `task-item ${task.completed ? 'completed' : ''}`;
                div.innerHTML = `
                    <div class="task-info">
                        <div class="task-name">${task.name}</div>
                        <div class="task-priority priority-${task.priority}">
                            ${getPriorityText(task.priority)}
                        </div>
                    </div>
                    <div>
                        <button class="check-btn" onclick="toggleTask(${index})">
                            ${task.completed ? '↩' : '✓'}
                        </button>
                        <button class="delete-btn" onclick="deleteTask(${index})">✕</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function getPriorityText(priority) {
            const priorities = {
                high: 'Высокий приоритет',
                medium: 'Средний приоритет',
                low: 'Низкий приоритет'
            };
            return priorities[priority];
        }

        // Добавление привычки
        function addHabit() {
            const input = document.getElementById('habitInput');
            const name = input.value.trim();
            
            if (name) {
                habits.push({
                    name: name,
                    streak: 0,
                    completedToday: false
                });
                input.value = '';
                saveData();
                renderHabits();
            }
        }

        // Переключение привычки
        function toggleHabit(index) {
            const habit = habits[index];
            if (!habit.completedToday) {
                habit.completedToday = true;
                habit.streak++;
            } else {
                habit.completedToday = false;
                habit.streak = Math.max(0, habit.streak - 1);
            }
            saveData();
            renderHabits();
        }

        // Удаление привычки
        function deleteHabit(index) {
            habits.splice(index, 1);
            saveData();
            renderHabits();
        }

        // Добавление задачи
        function addTask() {
            const input = document.getElementById('taskInput');
            const prioritySelect = document.getElementById('taskPriority');
            const name = input.value.trim();
            
            if (name) {
                tasks.push({
                    name: name,
                    priority: prioritySelect.value,
                    completed: false
                });
                input.value = '';
                saveData();
                renderTasks();
            }
        }

        // Переключение задачи
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveData();
            renderTasks();
        }

        // Удаление задачи
        function deleteTask(index) {
            tasks.splice(index, 1);
            saveData();
            renderTasks();
        }

        // Таймер функции
        function setTimerMode(minutes, btn) {
            pauseTimer();
            currentMode = minutes;
            timeLeft = minutes * 60;
            updateTimerDisplay();
            
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (!isRunning && timeLeft > 0) {
                isRunning = true;
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        if (currentMode === 25) {
                            pomodorosToday++;
                            saveData();
                            alert('🎉 Pomodoro завершен! Отличная работа!');
                        } else {
                            alert('⏰ Перерыв окончен! Пора работать!');
                        }
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
            }
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = currentMode * 60;
            updateTimerDisplay();
        }

        // Инициализация
        renderHabits();
        renderTasks();
        updateStats();
        updateTimerDisplay();

        // Обработка Enter в полях ввода
        document.getElementById('habitInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addHabit();
        });

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
